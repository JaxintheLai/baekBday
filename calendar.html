<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyoong MY | Calendar</title>
    <style>
        :root {
            --bg-cream: #FFFDF5;
            --soft-pink: #FFECF2;
            --accent-gold: #E6CFA0;
            --text-grey: #555;
            --exo-red: #D21F3C;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-grey);
            font-family: 'Georgia', serif;
            margin: 0;
            padding-top: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- 导航栏 --- */
        .navbar {
            position: fixed; top: 0; width: 100%; background: rgba(255, 253, 245, 0.98);
            border-bottom: 2px dashed var(--accent-gold); display: flex;
            justify-content: space-between; align-items: center; padding: 10px 15px;
            box-sizing: border-box; z-index: 9999; min-height: 70px;
        }
        .logo { font-weight: bold; color: var(--accent-gold); font-size: 1rem; }
        .nav-links { display: flex; justify-content: center; align-items: center; flex-grow: 1; }
        .nav-links.en-mode { flex-direction: column; gap: 5px; }
        .nav-row { display: flex; justify-content: center; gap: 10px; }
        .nav-links a { text-decoration: none; color: var(--text-grey); font-size: 0.8rem; }
        .lang-btn { background: white; border: 2px solid var(--accent-gold); padding: 4px 8px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; color: var(--accent-gold); }

        /* --- 返回按钮 (PC/iPad) --- */
        .left-back-btn { position: fixed; top: 150px; z-index: 1000; left: 50%; margin-left: -420px; }
        .left-back-btn a { text-decoration: none; color: var(--text-grey); background: white; border: 1px solid #EEE; padding: 10px 18px; border-radius: 50px; font-size: 0.85rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* --- 月历容器 --- */
        .container { width: 95%; max-width: 500px; text-align: center; padding-bottom: 50px; }
        
        .calendar-card {
            background: white; border-radius: 25px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 2px solid var(--soft-pink);
        }

        .calendar-nav {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; color: var(--exo-red); font-weight: bold;
        }

        /* 🛠️ 修复点 1：正圆导航箭头 */
        .nav-arrow {
            cursor: pointer;
            width: 35px; height: 35px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: var(--soft-pink);
            color: var(--exo-red); user-select: none; transition: 0.3s;
            font-weight: bold;
        }
        .nav-arrow:hover { background: var(--accent-gold); color: white; }

        /* 🛠️ 修复点 2：强力 Grid 布局，防止竖向排列 */
        .calendar-grid { 
            display: grid !important; 
            grid-template-columns: repeat(7, 1fr) !important; 
            gap: 10px; 
            width: 100%;
        }

        .weekday { font-size: 0.8rem; color: var(--accent-gold); font-weight: bold; padding-bottom: 10px; text-align: center; }
        
        .day {
            aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; border-radius: 50%; transition: 0.3s; position: relative;
            cursor: pointer; width: 100%;
        }

        /* 纪念日高亮样式 */
        .special-day { background: var(--soft-pink); color: var(--exo-red); font-weight: bold; border: 1px solid var(--accent-gold); }
        .special-day::after { content: '•'; position: absolute; bottom: 4px; font-size: 1rem; }
        .today { border: 1.5px solid var(--exo-red); }

        .event-info {
            margin-top: 25px; padding: 15px; font-size: 0.85rem;
            background: var(--bg-cream); border-radius: 15px; min-height: 40px;
            border: 1px dashed var(--accent-gold); line-height: 1.4;
        }

        /* 语言控制 */
        .en-content { display: none !important; }

        @media screen and (max-width: 600px) {
            .left-back-btn { display: none !important; }
            body { padding-top: 120px; }
            .calendar-card { padding: 15px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Kyoong<br>MY</div>
        <div class="nav-links" id="navLinks">
            <div class="cn-content">
                <a href="index.html">主页</a> <a href="countdown.html">倒计时</a>
                <a href="announcement.html">公告</a> <a href="calendar.html" style="font-weight:bold; color:var(--accent-gold);">月历</a>
                <a href="contact.html">联络</a>
            </div>
            <div class="en-content">
                <div class="nav-row"><a href="index.html">Home</a><a href="countdown.html">Timer</a><a href="announcement.html">Announcement</a></div>
                <div class="nav-row"><a href="calendar.html" style="font-weight:bold; color:var(--accent-gold);">Calendar</a><a href="contact.html">Contact</a></div>
            </div>
        </div>
        <div class="lang-btn" onclick="switchLanguage()">CN/EN</div>
    </nav>

    <div class="left-back-btn cn-content"><a href="index.html">← 返回</a></div>
    <div class="left-back-btn en-content"><a href="index.html">← Back</a></div>

    <div class="container">
        <div class="calendar-card">
            <div class="calendar-nav">
                <div class="nav-arrow" onclick="changeMonth(-1)"> < </div>
                <div id="monthDisplay" style="font-size: 1.2rem;">Month Year</div>
                <div class="nav-arrow" onclick="changeMonth(1)"> > </div>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                </div>
            <div class="event-info" id="eventInfo">
                <span class="cn-content">✨ 点击日期查看纪念日 ✨</span>
                <span class="en-content">✨ Click date to see events ✨</span>
            </div>
        </div>
    </div>

    <script>
        let date = new Date();
        let isEnglish = false;

        // 纪念日数据
        const anniversary = {
            "4-8": { cn: "EXO 出道日 👑", en: "EXO Debut Anniversary 👑" },
            "5-2": { cn: "光启处，是伯贤 生咖正日 ☕", en: "Where Light Begins Cup Sleeve Event Day ☕" },
            "5-6": { cn: "伯贤 生日快乐 🍓", en: "Happy Baekhyun Day 🍓" },
            "7-10": { cn: "伯贤 Solo 出道日 🎤", en: "Baekhyun Solo Debut Anniversary 🎤" },
            "8-5": { cn: "爱丽们 生日快乐 🐶", en: "EXO-L Birthday 🐶" },
            "10-31": { cn: "EXO-CBX 出道日 ⚡", en: "EXO-CBX Debut Anniversary ⚡" }
        };

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const monthDisplay = document.getElementById('monthDisplay');
            grid.innerHTML = '';

            const year = date.getFullYear();
            const month = date.getMonth();

            // 月份名称
            const monthNames = isEnglish ? 
                ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"] :
                ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
            
            monthDisplay.innerText = isEnglish ? `${monthNames[month]} ${year}` : `${year}年 ${monthNames[month]}`;

            // 渲染周标题
            const weekdays = ["S", "M", "T", "W", "T", "F", "S"];
            weekdays.forEach(d => {
                grid.innerHTML += `<div class="weekday">${d}</div>`;
            });

            // 计算日期
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            // 填充前面的空白
            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div></div>`;
            }

            // 填充日期数字
            for (let i = 1; i <= lastDate; i++) {
                const key = `${month + 1}-${i}`;
                const isSpecial = anniversary[key];
                const isToday = new Date().toDateString() === new Date(year, month, i).toDateString();
                
                let dayClass = isSpecial ? 'day special-day' : 'day';
                if (isToday) dayClass += ' today';

                grid.innerHTML += `<div class="${dayClass}" onclick="showEvent('${key}')">${i}</div>`;
            }
        }

        function showEvent(key) {
            const info = document.getElementById('eventInfo');
            if (anniversary[key]) {
                info.innerText = isEnglish ? anniversary[key].en : anniversary[key].cn;
                info.style.color = "var(--exo-red)";
                info.style.fontWeight = "bold";
            } else {
                info.innerText = isEnglish ? "✨Click date to see events ✨" : "✨ 点击日期查看纪念日 ✨";
                info.style.color = "var(--text-grey)";
                info.style.fontWeight = "normal";
            }
        }

        function changeMonth(dir) {
            date.setMonth(date.getMonth() + dir);
            renderCalendar();
        }

        function switchLanguage() {
            isEnglish = !isEnglish;
            document.getElementById('navLinks').classList.toggle('en-mode', isEnglish);
            const cnItems = document.querySelectorAll('.cn-content');
            const enItems = document.querySelectorAll('.en-content');
            
            cnItems.forEach(el => el.style.setProperty('display', isEnglish ? 'none' : 'inline-block', 'important'));
            enItems.forEach(el => el.style.setProperty('display', isEnglish ? 'inline-block' : 'none', 'important'));
            
            renderCalendar();
        }

        renderCalendar();
    </script>
</body>
</html>
