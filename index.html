<!DOCTYPE html>

        .sketch-container { border: 4px solid #FF4D4D; padding: 40px; text-align: center; width: 80%; max-width: 500px; border-radius: 15px; background: white; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); }

        .event-type { color: #2ECC71; font-size: 1.5rem; margin-bottom: 10px; }
        .dummy-countdown { color: #FF4D4D; font-size: 2.5rem; font-weight: bold; }
    </style>
</head>
