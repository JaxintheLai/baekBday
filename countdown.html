<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyoong MY | Countdown</title>
    <style>
        :root {
            --bg-cream: #FFFDF5;
            --soft-pink: #FFECF2;
            --dreamy-blue: #EBF8FF;
            --accent-gold: #E6CFA0;
            --text-grey: #555;
            --exo-red: #D21F3C;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-grey);
            font-family: 'Georgia', serif;
            margin: 0;
            padding-top: 100px; /* 给导航栏留空间 */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- 导航栏 (统一风格) --- */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 253, 245, 0.98);
            border-bottom: 2px dashed var(--accent-gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            box-sizing: border-box;
            z-index: 9999;
        }

        .logo { font-weight: bold; color: var(--accent-gold); font-size: 1.1rem; }
        .nav-links a { text-decoration: none; color: var(--text-grey); margin: 0 8px; font-size: 0.85rem; }
        
        .lang-btn {
            background-color: white;
            border: 2px solid var(--accent-gold);
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--accent-gold);
            min-width: 60px;
            text-align: center;
        }

        /* --- 倒计时核心区域 --- */
        .container {
            text-align: center;
            width: 90%;
            max-width: 600px;
            padding: 20px;
        }

        h1 { color: var(--accent-gold); font-size: 1.8rem; margin-bottom: 30px; letter-spacing: 2px; }

        .selection-area {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap; /* 手机端自动换行 */
        }

        .select-btn {
            background: white;
            border: 1px solid #EEE;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            color: #888;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .select-btn.active {
            background: var(--soft-pink);
            border-color: var(--accent-gold);
            color: var(--exo-red);
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .countdown-display {
            background: white;
            border: 2px solid var(--soft-pink);
            padding: 40px 20px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        #event-title {
            color: var(--exo-red);
            font-size: 1.2rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .timer-digits {
            font-size: 1.8rem;
            color: #333;
            font-weight: bold;
        }

        /* 显隐逻辑 */
        .en-content { display: none !important; }
        .cn-content { display: block !important; }
        a.en-content, a.cn-content { display: none !important; }

        /* 手机端适配 */
        @media screen and (max-width: 600px) {
            h1 { font-size: 1.4rem; }
            .timer-digits { font-size: 1.4rem; }
            .nav-links a { margin: 0 4px; font-size: 0.7rem; }
            .select-btn { padding: 10px 15px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Kyoong MY</div>
        <div class="nav-links">
            <a href="index.html" class="cn-content">主页</a>
            <a href="index.html" class="en-content">Home</a>
            
            <a href="countdown.html" class="cn-content" style="font-weight: bold; color: var(--accent-gold);">倒计时</a>
            <a href="countdown.html" class="en-content" style="font-weight: bold; color: var(--accent-gold);">Timer</a>

            <a href="announcement.html" class="cn-content">公告</a>
            <a href="announcement.html" class="en-content">News</a>

            <a href="calendar.html" class="cn-content">月历</a>
            <a href="calendar.html" class="en-content">Calendar</a>

            <a href="contact.html" class="cn-content">联络</a>
            <a href="contact.html" class="en-content">Contact</a>
        </div>
        <div class="lang-btn" onclick="switchLanguage()">CN/EN</div>
    </nav>

    <div class="container">
        <h1 class="cn-content">倒计时中心</h1>
        <h1 class="en-content">COUNTDOWN CENTER</h1>

        <div class="selection-area">
            <button class="select-btn active" id="btn-cs" onclick="setEvent('cs')">
                <span class="cn-content">生咖正日 (May 2)</span>
                <span class="en-content">Cup Sleeve Event (May 2)</span>
            </button>
            <button class="select-btn" id="btn-bday" onclick="setEvent('bday')">
                <span class="cn-content">伯贤生日 (May 6)</span>
                <span class="en-content">Baekhyun Day (May 6)</span>
            </button>
        </div>

        <div class="countdown-display">
            <div id="event-title"></div>
            <div class="timer-digits" id="timer-digits">Calculating...</div>
        </div>
    </div>

    <script>
        // 倒计时配置
        const events = {
            cs: { 
                cn: "伯贤生咖正日 ✦", 
                en: "Cafe Event Day ✦",
                time: new Date('May 2, 2026 12:00:00').getTime() 
            },
            bday: { 
                cn: "伯贤生日 ✦", 
                en: "Baekhyun's Birthday ✦",
                time: new Date('May 6, 2026 00:00:00').getTime() 
            }
        };

        let currentEvent = 'cs';
        let isEnglish = false;

        function setEvent(k) {
            currentEvent = k;
            document.getElementById('btn-cs').classList.remove('active');
            document.getElementById('btn-bday').classList.remove('active');
            document.getElementById('btn-'+k).classList.add('active');
            update(); 
        }

        function update() {
            const now = new Date().getTime();
            const eventData = events[currentEvent];
            const diff = eventData.time - now;
            
            // 根据语言显示标题
            document.getElementById('event-title').innerHTML = isEnglish ? eventData.en : eventData.cn;

            if (diff > 0) {
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                
                const displayS = s < 10 ? '0' + s : s;
                const displayM = m < 10 ? '0' + m : m;

                const dayStr = isEnglish ? "Days" : "天";
                const hourStr = isEnglish ? "Hrs" : "时";
                const minStr = isEnglish ? "Min" : "分";
                const secStr = isEnglish ? "Sec" : "秒";

                document.getElementById('timer-digits').innerHTML = 
                    `${d}${dayStr} ${h}${hourStr} ${displayM}${minStr} <span style="color:var(--exo-red);">${displayS}${secStr}</span>`;
            } else {
                document.getElementById('timer-digits').innerHTML = "HAPPY BAEKHYUN DAY! 🎉";
            }
        }

        // 语言切换逻辑
        function switchLanguage() {
            isEnglish = !isEnglish;
            const cnItems = document.querySelectorAll('.cn-content');
            const enItems = document.querySelectorAll('.en-content');
            
            if (isEnglish) {
                cnItems.forEach(el => el.style.setProperty('display', 'none', 'important'));
                enItems.forEach(el => {
                    let displayType = (el.tagName === 'DIV' || el.tagName === 'P' || el.tagName === 'IMG') ? 'block' : 'inline-block';
                    el.style.setProperty('display', displayType, 'important');
                });
            } else {
                enItems.forEach(el => el.style.setProperty('display', 'none', 'important'));
                cnItems.forEach(el => {
                    let displayType = (el.tagName === 'DIV' || el.tagName === 'P' || el.tagName === 'IMG') ? 'block' : 'inline-block';
                    el.style.setProperty('display', displayType, 'important');
                });
            }
            update(); // 切换语言后立即刷新倒计时文字
        }

        setInterval(update, 1000); 
        update();

    </script>
</body>
</html>
