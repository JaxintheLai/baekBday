<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyoong MY | Countdown</title>
    <style>
        :root {
            --bg-cream: #FFFDF5;
            --soft-pink: #FFECF2;
            --dreamy-blue: #EBF8FF;
            --accent-gold: #E6CFA0;
            --text-grey: #555;
            --exo-red: #D21F3C;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-grey);
            font-family: 'Georgia', serif;
            margin: 0;
            padding-top: 110px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- 导航栏核心修复 --- */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 253, 245, 0.98);
            border-bottom: 2px dashed var(--accent-gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            box-sizing: border-box;
            z-index: 9999;
            min-height: 70px;
        }

        .logo { font-weight: bold; color: var(--accent-gold); font-size: 1rem; flex-shrink: 0; }

        /* 导航链接容器：默认布局 */
        .nav-links {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            padding: 0 10px;
        }

        /* 当切换为英文版时，通过 JS 动态添加这个 class 来实现两行 */
        .nav-links.en-mode {
            flex-direction: column; /* 变成上下两行 */
            gap: 5px;
        }

        .nav-row { display: flex; justify-content: center; gap: 10px; }

        .nav-links a { text-decoration: none; color: var(--text-grey); font-size: 0.8rem; white-space: nowrap; }
        
        .lang-btn {
            background-color: white;
            border: 2px solid var(--accent-gold);
            padding: 4px 8px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: bold;
            color: var(--accent-gold);
            flex-shrink: 0;
        }

        /* --- 返回按钮定位 --- */
        .left-back-btn {
            position: fixed;
            top: 150px;
            z-index: 1000;
            left: 30%;
            margin-left: -380px; 
        }
        .left-back-btn a {
            text-decoration: none;
            color: var(--text-grey);
            background: white;
            border: 1px solid #EEE;
            padding: 10px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
        }

        /* --- 倒计时内容 --- */
        .container { text-align: center; width: 90%; max-width: 600px; padding: 20px; }
        h1 { color: var(--accent-gold); font-size: 1.8rem; margin-bottom: 30px; letter-spacing: 2px; }
        .selection-area { margin-bottom: 30px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .select-btn { background: white; border: 1px solid #EEE; padding: 12px 20px; border-radius: 50px; cursor: pointer; color: #888; font-size: 0.85rem; }
        .select-btn.active { background: var(--soft-pink); border-color: var(--accent-gold); color: var(--exo-red); font-weight: bold; }
        .countdown-display { background: white; border: 2px solid var(--soft-pink); padding: 40px 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        #event-title { color: var(--exo-red); font-size: 1.2rem; margin-bottom: 15px; font-weight: bold; }
        .timer-digits { font-size: 1.8rem; color: #333; font-weight: bold; }

        /* 初始显隐逻辑 */
        .en-content { display: none !important; }
        .cn-content { display: inline-block !important; }
        h1.cn-content, div.cn-content { display: block !important; }

        @media screen and (max-width: 600px) {
            body { padding-top: 120px; }
            .navbar { padding: 10px 8px; }
            .left-back-btn { display: none !important; }
            .timer-digits { font-size: 1.3rem; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Kyoong<br>MY</div>
        
        <div class="nav-links" id="navLinks">
            <div class="cn-content">
                <a href="index.html">主页</a>
                <a href="countdown.html" style="font-weight:bold; color:var(--accent-gold);">倒计时</a>
                <a href="announcement.html">公告</a>
                <a href="calendar.html">月历</a>
                <a href="contact.html">联络</a>
            </div>

            <div class="en-content">
                <div class="nav-row">
                    <a href="index.html">Home</a>
                    <a href="countdown.html" style="font-weight:bold; color:var(--accent-gold);">Timer</a>
                    <a href="announcement.html">Announcement</a>
                </div>
                <div class="nav-row">
                    <a href="calendar.html">Calendar</a>
                    <a href="contact.html">Contact</a>
                </div>
            </div>
        </div>

        <div class="lang-btn" onclick="switchLanguage()">CN/EN</div>
    </nav>

    <div class="left-back-btn cn-content">
        <a href="index.html">← 返回</a>
    </div>
    <div class="left-back-btn en-content">
        <a href="index.html">← Back</a>
    </div>

    <div class="container">
        <h1 class="cn-content">倒计时中心</h1>
        <h1 class="en-content">COUNTDOWN CENTER</h1>

        <div class="selection-area">
            <button class="select-btn active" id="btn-cs" onclick="setEvent('cs')">
                <span class="cn-content">生咖正日 (May 2)</span>
                <span class="en-content">Cup Seelve Event (May 2)</span>
            </button>
            <button class="select-btn" id="btn-bday" onclick="setEvent('bday')">
                <span class="cn-content">伯贤生日 (May 6)</span>
                <span class="en-content">Baekhyun Day (May 6)</span>
            </button>
        </div>

        <div class="countdown-display">
            <div id="event-title"></div>
            <div class="timer-digits" id="timer-digits">Calculating...</div>
        </div>
    </div>

    <script>
        const events = {
            cs: { cn: "✦ 伯贤生咖 ✦", en: "✦ Cup Sleeve Event Day ✦", time: new Date('May 2, 2026 12:00:00').getTime() },
            bday: { cn: "✦ 伯贤日 ✦", en: "✦ Baekhyun's Birthday ✦", time: new Date('May 6, 2026 00:00:00').getTime() }
        };

        let currentEvent = 'cs';
        let isEnglish = false;

        function setEvent(k) {
            currentEvent = k;
            document.getElementById('btn-cs').classList.remove('active');
            document.getElementById('btn-bday').classList.remove('active');
            document.getElementById('btn-'+k).classList.add('active');
            update(); 
        }

        function update() {
            const now = new Date().getTime();
            const eventData = events[currentEvent];
            const diff = eventData.time - now;
            document.getElementById('event-title').innerHTML = isEnglish ? eventData.en : eventData.cn;

            if (diff > 0) {
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                
                const dS = isEnglish ? "D" : "天", hS = isEnglish ? "H" : "时", mS = isEnglish ? "M" : "分", sS = isEnglish ? "S" : "秒";
                document.getElementById('timer-digits').innerHTML = `${d}${dS} ${h}${hS} ${m < 10 ? '0'+m : m}${mS} <span style="color:var(--exo-red);">${s < 10 ? '0'+s : s}${sS}</span>`;
            } else {
                document.getElementById('timer-digits').innerHTML = "HAPPY BAEKHYUN DAY! 🎉";
            }
        }

        function switchLanguage() {
            isEnglish = !isEnglish;
            const cnItems = document.querySelectorAll('.cn-content');
            const enItems = document.querySelectorAll('.en-content');
            const navLinks = document.getElementById('navLinks');
            
            // 切换导航栏布局模式
            if (isEnglish) {
                navLinks.classList.add('en-mode');
            } else {
                navLinks.classList.remove('en-mode');
            }

            cnItems.forEach(el => el.style.setProperty('display', isEnglish ? 'none' : ((el.tagName==='DIV'||el.tagName==='H1')?'block':'inline-block'), 'important'));
            enItems.forEach(el => el.style.setProperty('display', isEnglish ? ((el.tagName==='DIV'||el.tagName==='H1')?'block':'inline-block') : 'none', 'important'));
            update();
        }

        setInterval(update, 1000); 
        update();
    </script>
</body>
</html>
